name: Auto Sync Drive Videos


on:
  schedule:
    - cron: '*/5 * * * *'   # run every 5 minutes (UTC time)
  workflow_dispatch:         # keep manual "Run workflow" button


permissions:
  contents: write            # allow this workflow to commit to the repo

concurrency:
  group: videos-json
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y >/dev/null 2>&1 || true
          npm i googleapis axios

      - name: Write service account key file
        run: |
          echo '${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}' > demo-service-key.json

      - name: Run sync script
        env:
          # GitHub provides this automatically with write permission because of "permissions: contents: write"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node index.js
