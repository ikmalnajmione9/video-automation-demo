<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Video Automation Demo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #111;
      color: white;
    }
    h1 {
      margin-bottom: 30px;
      font-size: 2rem;
    }
    .video-card {
      margin-bottom: 40px;
      background: #222;
      padding: 20px;
      border-radius: 12px;
    }
    iframe {
      width: 100%;
      max-width: 800px;
      height: 450px;
      border: none;
      border-radius: 12px;
    }
    .details {
      margin-top: 10px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>

  <h1>Video Automation Demo</h1>
  <div id="videos">Loading videos...</div>

  <script>
    async function loadVideos() {
      const url = "https://raw.githubusercontent.com/ikmalnajmione9/video-automation-demo/main/videos.json";
      const res = await fetch(url);
      const videos = await res.json();

      const container = document.getElementById("videos");
      container.innerHTML = "";

      videos.forEach(v => {
        container.innerHTML += `
          <div class="video-card">
            <h3>${v.name}</h3>
            <iframe src="${v.url}" allow="autoplay"></iframe>
            <div class="details">
              Google Drive ID: ${v.driveFileId}<br>
              Uploaded: ${new Date(v.publishedAt).toLocaleString()}
            </div>
          </div>
        `;
      });
    }

    loadVideos();
  </script>
</body>
</html>
